spring.datasource.url=jdbc:mysql://localhost:3306/demo
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update

# Redis 連線設定
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Kafka 連線設定
spring.kafka.bootstrap-servers=localhost:9092
# producer：value 用 JSON 序列化
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
# consumer：屬於哪個消費群組、value 用 JSON 反序列化
spring.kafka.consumer.group-id=spin-record-group
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.auto-offset-reset=earliest
# 允許反序列化成我們自己的類別
spring.kafka.consumer.properties.spring.json.trusted.packages=com.example.demo.*
# 批次模式：listener 一次收一整批 List
spring.kafka.listener.type=batch
# 一次 poll 最多拉幾筆
spring.kafka.consumer.max-poll-records=500